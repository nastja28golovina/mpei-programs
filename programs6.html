<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Образовательные программы МЭИ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    color: #1a1a1a;
    background: #fff;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 40px 60px;
  }

  /* Search */
  .search-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }
  .search-input-wrap {
    display: flex;
    width: 100%;
    gap: 0;
    border: 1.5px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .search-input-wrap:focus-within { border-color: #a22b3c; }
  .search-input {
    flex: 1;
    padding: 12px 18px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    background: #fff;
  }
  .search-btn {
    background: #a22b3c;
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.01em;
  }
  .search-btn:hover { background: #7a1624; }

  /* Level tabs */
  .level-tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border: 1.5px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 40px;
  }
  .level-tab {
    padding: 13px 10px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #666;
    border: none;
    background: #fff;
    text-align: center;
    transition: all 0.2s;
    border-right: 1.5px solid #e0e0e0;
  }
  .level-tab:last-child { border-right: none; }
  .level-tab:hover { color: #a22b3c; background: #fdf5f6; }
  .level-tab.active {
    background: #a22b3c;
    color: #fff;
  }

  /* Institute section */
  .institute-section { margin-bottom: 8px; }

  .institute-header {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
    padding: 28px 0 14px;
    border-bottom: 2px solid #1a1a1a;
    letter-spacing: -0.01em;
  }

  /* Program row */
  .program-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid #ebebeb;
    gap: 24px;
  }
  .program-info { flex: 1; }
  .program-name {
    font-size: 15px;
    font-weight: 400;
    color: #1a1a1a;
    line-height: 1.45;
    margin-bottom: 5px;
  }
  .program-shifr {
    font-size: 12px;
    color: #aaa;
    font-weight: 400;
  }

  .btn-detail {
    background: #a22b3c;
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .btn-detail:hover { background: #7a1624; }

  .no-results {
    text-align: center;
    color: #aaa;
    padding: 60px 0;
    font-size: 15px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9999;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 6px;
    width: 100%;
    max-width: 740px;
    margin: auto;
    padding: 48px 52px;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 18px; right: 22px;
    background: none; border: none;
    font-size: 26px; cursor: pointer;
    color: #bbb; line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: #333; }
  .modal-shifr { font-size: 12px; color: #aaa; margin-bottom: 8px; letter-spacing: 0.03em; text-transform: uppercase; }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 32px;
    line-height: 1.35;
    color: #1a1a1a;
  }
  .modal-section { margin-bottom: 24px; }
  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #a22b3c;
    margin-bottom: 9px;
  }
  .modal-section-text {
    font-size: 14px;
    line-height: 1.75;
    color: #444;
    white-space: pre-line;
  }

  @media (max-width: 768px) {
    .container { padding: 0 16px 40px; }
    .level-tab { font-size: 11px; padding: 11px 6px; }
    .modal { padding: 28px 20px; }
    .modal-title { font-size: 17px; }
    .program-row { flex-wrap: wrap; }
    .institute-header { font-size: 16px; }
    .search-btn { padding: 12px 18px; font-size: 13px; }
  }
</style>
</head>

    <div class="modal-section">

    </div>
  </div>
</div>

ate/exams.html?", "level": "phd"}];

let currentLevel = 'bachelor';
let searchQuery = '';

function getInstitutes(level) {
  const seen = new Set();
  const list = [];
  PROGRAMS.forEach(p => {
    if (p.level === level && p.institute && !seen.has(p.institute)) {
      seen.add(p.institute);
      list.push(p.institute);
    }
  });
  return list;
}

function render() {
  const list = document.getElementById('programsList');
  const noResults = document.getElementById('noResults');
  const q = searchQuery.toLowerCase();

  const filtered = PROGRAMS.filter(p => {
    if (p.level !== currentLevel) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.institute.toLowerCase().includes(q)) return false;
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  if (currentLevel === 'phd') {
    list.innerHTML = filtered.map(p => `
      <div class="program-row">
        <div class="program-info">
          <div class="program-name">${p.name}</div>
          <div class="program-shifr">${p.shifr}</div>
        </div>
        <button class="btn-detail" onclick="openModal(${PROGRAMS.indexOf(p)})">Подробнее</button>
      </div>
    `).join('');
  } else {
    const institutes = getInstitutes(currentLevel).filter(inst =>
      filtered.some(p => p.institute === inst)
    );
    list.innerHTML = institutes.map(inst => {
      const instPrograms = filtered.filter(p => p.institute === inst);
      return `
        <div class="institute-section">
          <div class="institute-header">${inst}</div>
          ${instPrograms.map(p => `
            <div class="program-row">
              <div class="program-info">
                <div class="program-name">${p.name}</div>
                <div class="program-shifr">${p.shifr}</div>
              </div>
              <button class="btn-detail" onclick="openModal(${PROGRAMS.indexOf(p)})">Подробнее</button>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  }
}

function openModal(idx) {
  const p = PROGRAMS[idx];
  document.getElementById('modalShifr').textContent = p.shifr;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalDescText').textContent = p.desc;
  document.getElementById('modalSkillsText').textContent = p.skills;
  document.getElementById('modalCareersText').textContent = p.careers;
  document.getElementById('modalScoresText').textContent = p.scores;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').onclick = function(e) {
  if (e.target === this) closeModal();
};
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.querySelectorAll('.level-tab').forEach(tab => {
  tab.onclick = function() {
    document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentLevel = this.dataset.level;
    render();
  };
});

document.getElementById('searchInput').oninput = function() {
  searchQuery = this.value;
  render();
};

render();
</script>
